<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prosci Course Finder · Ask Prosci Advisor</title>
<link rel="stylesheet" href="colors_and_type.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@1.17.0/dist/umd/lucide.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--surface-cream); }
  body { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  ::selection { background: color-mix(in oklab, var(--accent-green) 70%, transparent); }
  button { font-family: var(--font-sans); }
  textarea::placeholder { color: var(--text-disabled); }
  @keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
  @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: .5; } }
  /* scrollbar */
  ::-webkit-scrollbar { width: 12px; height: 12px; }
  ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 999px; border: 3px solid var(--surface-cream); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="results.jsx"></script>
<script type="text/babel" src="tweaks-shim.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script>window.addEventListener('load', () => { if (window.lucide) window.lucide.createIcons(); });</script>
</body>
</html>
